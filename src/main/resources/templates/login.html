<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Event Booking System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">Event Booking System</a>
      <a class="btn btn-outline-light" href="/">Back to Home</a>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4">
        <h2 class="h4 text-center mb-1">Sign In</h2>
        <p class="text-center text-muted mb-4">Please enter your credentials</p>

        <div th:if="${param.error}" class="alert alert-danger py-2">
          Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2">
          You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label for="username" class="form-label">Username / Email</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required oninput="checkStrength(this.value)">
              <button class="btn btn-outline-secondary" type="button" onmousedown="showPass()" onmouseup="hidePass()" onmouseleave="hidePass()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                  <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                </svg>
              </button>
            </div>
            <div class="mt-2">
              <div class="progress" style="height: 6px;">
                <div id="strengthBar" class="progress-bar" style="width: 0%"></div>
              </div>
              <small id="strengthText" class="text-muted"></small>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a href="/forgot-password" class="small text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-dark w-100">Login</button>

          <div class="text-center mt-3">
            <span class="small text-muted">Don't have an account?</span>
            <a href="/register" class="small text-decoration-none">Register</a>
          </div>
        </form>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function showPass() {
      document.getElementById('password').type = 'text';
    }
    function hidePass() {
      document.getElementById('password').type = 'password';
    }
    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      let strength = 0;
      if (val.length >= 8) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;
      const levels = [
        { width: '0%', color: '', label: '' },
        { width: '25%', color: 'bg-danger', label: 'Weak' },
        { width: '50%', color: 'bg-warning', label: 'Fair' },
        { width: '75%', color: 'bg-info', label: 'Good' },
        { width: '100%', color: 'bg-success', label: 'Strong' }
      ];
      bar.style.width = levels[strength].width;
      bar.className = 'progress-bar ' + levels[strength].color;
      text.textContent = levels[strength].label;
    }
  </script>
</body>
</html>
