<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width: 420px;">
        <h3 class="text-center mb-1">Forgot Password</h3>
        <p class="text-center text-muted mb-4">Enter your email and we'll send you a reset link</p>

        <div th:if="${success}" class="alert alert-success">
            If that email exists, a reset link has been sent.
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Send Reset Link</button>
        </form>
        <p class="text-center mt-3"><a th:href="@{/login}">Back to Login</a></p>
    </div>
</div>
</body>
</html>
