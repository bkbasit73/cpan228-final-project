<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2>Create Event</h2>

    <form th:action="@{/events}" th:object="${event}" method="post">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" type="text" th:field="*{name}">
        </div>

        <div class="mb-3">
            <label class="form-label">Type</label>
            <select class="form-select" th:field="*{type}">
                <option value="">Select Type</option>
                <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input class="form-control" type="text" th:field="*{location}">
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input class="form-control" type="date" th:field="*{eventDate}">
        </div>

        <div class="mb-3">
            <label class="form-label">Capacity</label>
            <input class="form-control" type="number" th:field="*{capacity}">
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input class="form-control" type="number" step="0.01" th:field="*{price}">
        </div>

        <button class="btn btn-success">Save Event</button>
        <a class="btn btn-secondary" th:href="@{/events}">Cancel</a>

    </form>
</div>

</body>
</html>
